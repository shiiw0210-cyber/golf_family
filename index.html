<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>家族ゴルフ大会</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<style>
  :root {
    --cream: #fdf6e3;
    --cream-deep: #f6ecd1;
    --ink: #3a2f1b;
    --ink-soft: #6b5a3a;
    --gold: #d4a017;
    --gold-light: #f5c048;
    --gold-bright: #ffd700;
    --green: #2d5016;
    --green-soft: #4a7c24;
    --card-bg: #fffdf5;
    --card-shadow: 0 2px 4px rgba(120, 95, 40, 0.08), 0 1px 2px rgba(60, 45, 10, 0.06);
    --card-shadow-lg: 0 6px 16px rgba(120, 95, 40, 0.14), 0 2px 4px rgba(60, 45, 10, 0.08);
  }
  * { box-sizing: border-box; }
  body {
    font-family: "M PLUS Rounded 1c", -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    margin: 0;
    color: var(--ink);
    background-color: var(--cream);
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='56' height='56' viewBox='0 0 56 56'><g fill='%23d4a017' fill-opacity='0.09'><circle cx='8' cy='8' r='2'/><circle cx='28' cy='14' r='2'/><circle cx='48' cy='8' r='2'/><circle cx='16' cy='30' r='2'/><circle cx='36' cy='34' r='2'/><circle cx='6' cy='48' r='2'/><circle cx='26' cy='48' r='2'/><circle cx='46' cy='48' r='2'/></g></svg>");
    background-size: 56px 56px;
  }
  header {
    background: linear-gradient(135deg, #2d5016 0%, #3e6b1d 100%);
    color: #fff;
    padding: 18px 16px 16px;
    border-bottom: 3px solid var(--gold);
    box-shadow: 0 2px 6px rgba(60, 45, 10, 0.12);
  }
  header h1 { margin: 0 0 12px; font-size: 20px; font-weight: 800; letter-spacing: 0.02em; }
  nav { display: flex; gap: 6px; flex-wrap: wrap; }
  nav button {
    background: rgba(255,255,255,0.15);
    color: #fff;
    border: none;
    padding: 8px 14px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    font-weight: 500;
    transition: background 0.2s ease, color 0.2s ease, transform 0.08s ease, box-shadow 0.2s ease;
  }
  nav button:hover { background: rgba(255,255,255,0.28); }
  nav button:active { transform: scale(0.94); }
  nav button.active {
    background: #fff;
    color: var(--green);
    font-weight: 700;
    box-shadow: 0 0 0 2px var(--gold-bright) inset, 0 2px 6px rgba(0,0,0,0.15);
  }
  main { padding: 16px; max-width: 960px; margin: 0 auto; }
  section { display: none; }
  section.active { display: block; animation: tabFade 0.35s ease both; }
  h2 { margin-top: 0; font-size: 20px; font-weight: 800; color: var(--green); letter-spacing: 0.02em; }
  h2::after {
    content: "";
    display: block; width: 48px; height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light));
    border-radius: 2px; margin-top: 6px;
  }
  h3 { margin: 24px 0 8px; font-size: 15px; color: var(--ink-soft); font-weight: 700; }
  .note {
    background: #fff8dc;
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 13px;
    margin-bottom: 12px;
    border-left: 4px solid var(--gold);
    box-shadow: var(--card-shadow);
    color: var(--ink);
  }
  @keyframes tabFade {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Press feedback for all clickable controls */
  button { transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease, transform 0.08s ease; }
  button:active { transform: scale(0.96); }

  /* Floating effect for the home hero */
  .home-hero { text-align: center; margin: 4px 0 18px; }
  .home-hero .ball {
    display: inline-block; font-size: 52px; line-height: 1;
    animation: floatY 3.2s ease-in-out infinite;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
  }
  .home-hero .tagline { margin-top: 6px; color: #4a5c2a; font-size: 14px; letter-spacing: 0.05em; }
  @keyframes floatY {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-10px) rotate(4deg); }
  }

  /* Family photo on home */
  .family-photo {
    display: block;
    margin: 0 0 16px;
    border-radius: 14px;
    overflow: hidden;
    background: var(--card-bg);
    box-shadow: var(--card-shadow-lg);
    border: 1px solid rgba(212, 160, 23, 0.25);
    position: relative;
  }
  .family-photo img {
    display: block;
    width: 100%;
    height: auto;
    aspect-ratio: 4 / 3;
    object-fit: cover;
  }
  .family-photo .caption {
    position: absolute;
    left: 12px; bottom: 12px;
    background: rgba(45, 48, 22, 0.72);
    color: #fff8d0;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    padding: 4px 10px;
    border-radius: 999px;
    backdrop-filter: blur(4px);
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
  }

  /* Trophy bounce for winner indicators */
  .trophy {
    display: inline-block;
    animation: trophyBounce 1.2s ease-in-out infinite;
    transform-origin: 50% 80%;
  }
  @keyframes trophyBounce {
    0%, 100% { transform: translateY(0) scale(1); }
    30%      { transform: translateY(-6px) scale(1.08); }
    60%      { transform: translateY(0) scale(0.98); }
  }

  /* Confetti canvas overlay */
  #confettiCanvas {
    position: fixed; inset: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 9999; display: none;
  }
  /* Home */
  .home-card {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 16px 18px;
    box-shadow: var(--card-shadow);
    margin-bottom: 12px;
    border: 1px solid rgba(212, 160, 23, 0.15);
  }
  .home-card h3 { margin-top: 0; color: var(--green); }
  .home-meta { color: var(--ink-soft); font-size: 14px; margin: 4px 0; }
  .home-empty { color: #9a8a6a; font-size: 14px; }

  /* Setup (tournament info) */
  .setup-grid { display: grid; gap: 10px; grid-template-columns: 1fr; margin-bottom: 16px; }
  @media (min-width: 600px) { .setup-grid { grid-template-columns: 1fr 1fr; } }
  .field {
    background: var(--card-bg);
    padding: 12px 14px;
    border-radius: 10px;
    box-shadow: var(--card-shadow);
    border: 1px solid rgba(212, 160, 23, 0.15);
  }
  .field label { display: block; font-size: 12px; color: var(--ink-soft); margin-bottom: 4px; font-weight: 500; }
  .field input {
    width: 100%;
    border: 1px solid #e6d9b0;
    border-radius: 6px;
    padding: 8px 10px;
    font-size: 15px;
    font-family: inherit;
    background: #fffef9;
    color: var(--ink);
  }
  .field input:focus { outline: 2px solid var(--gold); outline-offset: -1px; border-color: var(--gold); }

  /* Teams */
  .team-grid { display: grid; gap: 8px; grid-template-columns: 1fr; }
  @media (min-width: 600px) { .team-grid { grid-template-columns: 1fr 1fr; } }
  .member-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--card-bg);
    padding: 12px 14px;
    border-radius: 10px;
    box-shadow: var(--card-shadow);
    border: 1px solid rgba(212, 160, 23, 0.15);
  }
  .member-name { font-size: 16px; font-weight: 500; color: var(--ink); }
  .team-buttons button {
    padding: 6px 14px;
    border: 2px solid #e0d4b0;
    background: #fffdf2;
    color: var(--ink);
    border-radius: 999px;
    margin-left: 4px;
    cursor: pointer;
    font-weight: 700;
    font-size: 14px;
    font-family: inherit;
  }
  .team-buttons button.team-A.selected { background: #3b82f6; color: #fff; border-color: #3b82f6; box-shadow: 0 2px 6px rgba(59,130,246,0.35); }
  .team-buttons button.team-B.selected { background: #ef4444; color: #fff; border-color: #ef4444; box-shadow: 0 2px 6px rgba(239,68,68,0.35); }
  .team-summary { display: flex; gap: 10px; margin-top: 16px; }
  .team-summary > div {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    text-align: center;
    color: #fff;
    font-weight: 700;
    box-shadow: var(--card-shadow);
  }
  .bg-A { background: linear-gradient(135deg, #3b82f6, #2563eb); }
  .bg-B { background: linear-gradient(135deg, #ef4444, #dc2626); }

  /* Scores */
  .score-toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .btn {
    background: linear-gradient(135deg, var(--green), var(--green-soft));
    color: #fff;
    border: none;
    padding: 10px 18px;
    border-radius: 999px;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    font-weight: 700;
    box-shadow: 0 2px 6px rgba(45, 80, 22, 0.25);
  }
  .btn:hover { box-shadow: 0 3px 10px rgba(45, 80, 22, 0.35); }
  .btn-outline { background: var(--card-bg); color: var(--green); border: 1px solid var(--green); box-shadow: none; }
  .btn-danger {
    background: #c62828;
    color: #fff;
    border: none;
    padding: 8px 16px;
    border-radius: 999px;
    cursor: pointer;
    margin-top: 16px;
    font-family: inherit;
    font-weight: 700;
    box-shadow: 0 2px 6px rgba(198, 40, 40, 0.25);
  }
  .score-table-wrap {
    overflow-x: auto;
    background: var(--card-bg);
    border-radius: 10px;
    box-shadow: var(--card-shadow);
    border: 1px solid rgba(212, 160, 23, 0.15);
  }
  table.scores { border-collapse: collapse; width: 100%; min-width: 720px; }
  table.scores th, table.scores td { border: 1px solid #f0e6c8; padding: 2px; text-align: center; font-size: 13px; }
  table.scores thead th { background: var(--cream-deep); position: sticky; top: 0; font-weight: 700; color: var(--ink); }
  table.scores td.name { text-align: left; padding-left: 10px; white-space: nowrap; color: var(--ink); }
  table.scores input { width: 38px; border: none; background: transparent; text-align: center; font-size: 14px; padding: 6px 0; font-family: inherit; color: var(--ink); }
  table.scores input:focus { outline: 2px solid var(--gold); background: #fffde7; }
  table.scores td.total { background: #fbf3d8; font-weight: 800; min-width: 44px; color: var(--green); }
  table.scores tr.team-header td {
    text-align: left;
    padding: 6px 12px;
    font-weight: 800;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: #fff;
    border: 1px solid rgba(255,255,255,0.3);
  }
  table.scores tr.team-header.team-row-A td { background: linear-gradient(135deg, #3b82f6, #2563eb); }
  table.scores tr.team-header.team-row-B td { background: linear-gradient(135deg, #ef4444, #dc2626); }
  table.scores tr.team-header.team-row-none td { background: #c9b98a; color: #4a3d1c; }
  table.scores tr.member-A td.name { background: #eaf2ff; }
  table.scores tr.member-B td.name { background: #ffe9e9; }
  .team-badge { display: inline-block; width: 10px; height: 10px; border-radius: 50%; vertical-align: middle; margin-right: 6px; }

  /* Sync status badge */
  .sync-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 700;
    padding: 3px 10px;
    border-radius: 999px;
    letter-spacing: 0.06em;
    background: rgba(255,255,255,0.15);
    color: #fff;
    margin-left: 8px;
    vertical-align: middle;
    white-space: nowrap;
  }
  .sync-badge .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #ffb4b4;
    box-shadow: 0 0 0 0 rgba(255, 215, 0, 0);
  }
  .sync-badge.state-connected { background: rgba(76, 175, 80, 0.28); }
  .sync-badge.state-connected .dot {
    background: #8fff9a;
    animation: syncPulse 1.8s ease-in-out infinite;
  }
  .sync-badge.state-connecting { background: rgba(255, 215, 0, 0.22); }
  .sync-badge.state-connecting .dot { background: var(--gold-bright); }
  .sync-badge.state-local { background: rgba(255,255,255,0.15); }
  .sync-badge.state-local .dot { background: #d9c9a4; }
  @keyframes syncPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(143, 255, 154, 0.55); }
    50%      { box-shadow: 0 0 0 6px rgba(143, 255, 154, 0); }
  }

  /* Ranking */
  .team-result { display: flex; gap: 10px; margin-bottom: 8px; }
  .team-result > div {
    flex: 1;
    padding: 20px;
    border-radius: 12px;
    color: #fff;
    text-align: center;
    box-shadow: var(--card-shadow-lg);
  }
  .team-result h4 { margin: 0 0 6px; font-size: 16px; font-weight: 700; }
  .team-result .members { font-size: 12px; opacity: 0.9; min-height: 18px; }
  .team-result .score { font-size: 34px; font-weight: 800; margin-top: 6px; }
  .winner { outline: 4px solid var(--gold-bright); outline-offset: -4px; box-shadow: 0 0 0 2px #fff, 0 6px 18px rgba(212, 160, 23, 0.4); }
  .verdict { text-align: center; font-weight: 700; margin: 12px 0 20px; font-size: 16px; }
  .ranking-table {
    width: 100%;
    background: var(--card-bg);
    border-collapse: collapse;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: var(--card-shadow);
  }
  .ranking-table th, .ranking-table td { padding: 10px 12px; border-bottom: 1px solid #f0e6c8; text-align: left; font-size: 14px; }
  .ranking-table th { background: var(--cream-deep); color: var(--ink); font-weight: 700; }
  .ranking-table .rank { width: 40px; text-align: center; font-weight: 800; color: var(--green); }
  .ranking-table tr.top1 td { background: #fff7dc; font-weight: 700; }
  .ranking-table tr.top1 .rank { color: var(--gold); }

  /* History */
  .history-item {
    background: var(--card-bg);
    border-radius: 12px;
    padding: 14px 16px;
    box-shadow: var(--card-shadow);
    margin-bottom: 10px;
    border: 1px solid rgba(212, 160, 23, 0.15);
    border-left: 4px solid var(--gold);
  }
  .history-item h4 { margin: 0 0 4px; font-size: 16px; color: var(--green); font-weight: 700; }
  .history-meta { color: var(--ink-soft); font-size: 13px; margin-bottom: 6px; }
  .history-winner { font-weight: 700; color: var(--gold); }
  .history-empty { color: #9a8a6a; font-size: 14px; text-align: center; padding: 24px; }

  /* --- Memory elements --- */

  /* 第N回 medal */
  .number-medal {
    display: inline-flex;
    flex-direction: column;
    align-items: center; justify-content: center;
    width: 58px; height: 58px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #fff2a8, var(--gold-bright) 45%, var(--gold) 100%);
    color: #5a3a00;
    font-weight: 800;
    line-height: 1;
    box-shadow: 0 4px 10px rgba(212, 160, 23, 0.4), inset 0 -3px 6px rgba(120, 80, 0, 0.25), inset 0 2px 2px rgba(255,255,255,0.6);
    border: 2px solid #fff8d0;
    flex-shrink: 0;
  }
  .number-medal .kai-label { font-size: 9px; letter-spacing: 0.08em; opacity: 0.75; }
  .number-medal .kai-num { font-size: 22px; font-weight: 800; }
  .number-medal.small { width: 46px; height: 46px; }
  .number-medal.small .kai-num { font-size: 18px; }

  /* Home current card as a flex row */
  .current-head { display: flex; align-items: center; gap: 14px; margin-bottom: 6px; }
  .current-head .title { flex: 1; }
  .current-head h3 { margin: 0; font-size: 18px; }

  /* Past winners gallery */
  .winner-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: var(--card-bg);
    border-radius: 12px;
    padding: 14px 16px;
    box-shadow: var(--card-shadow);
    border: 1px solid rgba(212,160,23,0.2);
    margin-bottom: 10px;
    border-left: 4px solid var(--gold);
  }
  .winner-card .info { flex: 1; min-width: 0; }
  .winner-card .title { font-weight: 800; color: var(--green); font-size: 15px; }
  .winner-card .meta { font-size: 12px; color: var(--ink-soft); margin-top: 2px; }

  /* Team winner badge (pill shown on winner team card) */
  .winner-badge {
    display: inline-block;
    background: linear-gradient(135deg, #fff2a8, var(--gold-bright) 50%, var(--gold));
    color: #5a3a00;
    padding: 4px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.12em;
    margin-top: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.22), inset 0 1px 0 rgba(255,255,255,0.5);
    text-shadow: 0 1px 0 rgba(255,255,255,0.35);
  }

  /* MVP card */
  .mvp-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: linear-gradient(135deg, #fff7dc, #fbe8a6);
    border: 2px solid var(--gold);
    border-radius: 14px;
    padding: 14px 16px;
    margin: 16px 0 20px;
    box-shadow: 0 4px 12px rgba(212, 160, 23, 0.22);
  }
  .mvp-card .star {
    font-size: 36px;
    line-height: 1;
    filter: drop-shadow(0 2px 3px rgba(212,160,23,0.55));
    animation: mvpStar 2.4s ease-in-out infinite;
  }
  @keyframes mvpStar {
    0%, 100% { transform: rotate(-6deg) scale(1); }
    50%      { transform: rotate(6deg) scale(1.1); }
  }
  .mvp-card .info { flex: 1; min-width: 0; }
  .mvp-card .label {
    font-size: 11px;
    letter-spacing: 0.25em;
    color: #8a6d1a;
    font-weight: 800;
  }
  .mvp-card .name {
    font-size: 22px;
    font-weight: 800;
    color: #5a3a00;
    margin-top: 2px;
  }
  .mvp-card .score {
    font-size: 24px;
    font-weight: 800;
    color: var(--green);
    white-space: nowrap;
  }
  .mvp-card .score small {
    display: block; font-size: 10px; color: var(--ink-soft); font-weight: 500; letter-spacing: 0.12em;
  }

  /* History item becomes a composite card */
  .history-item { display: flex; align-items: flex-start; gap: 14px; }
  .history-item .body { flex: 1; min-width: 0; }
  .history-item .body h4 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .history-item .mvp-inline {
    display: inline-flex; align-items: center; gap: 6px;
    background: #fff7dc;
    border: 1px solid var(--gold);
    border-radius: 999px;
    padding: 2px 10px;
    font-size: 12px;
    font-weight: 700;
    color: #5a3a00;
  }

  /* ============================================================
     Dynamic UX layer
     ============================================================ */

  /* Tab slide animations (direction aware). Tabs keep tabFade as a fallback */
  @keyframes slideInRight {
    from { opacity: 0; transform: translateX(28px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes slideInLeft {
    from { opacity: 0; transform: translateX(-28px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  section.active.slide-right { animation: slideInRight 0.35s cubic-bezier(.2,.8,.2,1) both; }
  section.active.slide-left  { animation: slideInLeft  0.35s cubic-bezier(.2,.8,.2,1) both; }

  /* Nav relative positioning + sliding indicator */
  nav { position: relative; }
  .nav-indicator {
    position: absolute;
    bottom: -3px;
    left: 0;
    height: 3px;
    width: 0;
    border-radius: 2px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold-bright));
    box-shadow: 0 0 8px rgba(255, 215, 0, 0.65);
    transition: transform 0.32s cubic-bezier(.2,.8,.2,1), width 0.32s cubic-bezier(.2,.8,.2,1);
    pointer-events: none;
  }

  /* Ripple effect for tactile buttons */
  .btn, .btn-danger, .team-buttons button, nav button { position: relative; overflow: hidden; }
  .ripple {
    position: absolute;
    border-radius: 50%;
    pointer-events: none;
    transform: translate(-50%, -50%) scale(0);
    background: radial-gradient(circle, rgba(255,255,255,0.55) 0%, rgba(255,255,255,0) 70%);
    animation: rippleOut 0.55s ease-out forwards;
  }
  .team-buttons button .ripple { background: radial-gradient(circle, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0) 70%); }
  @keyframes rippleOut {
    to { transform: translate(-50%, -50%) scale(4); opacity: 0; }
  }

  /* Score cell flash + nice-pop */
  table.scores td.total { position: relative; transition: background 0.25s ease; }
  table.scores td.total.cell-flash { animation: cellFlash 0.65s ease; }
  @keyframes cellFlash {
    0%   { background: #fff1b0; transform: scale(1.0); box-shadow: inset 0 0 0 2px var(--gold); }
    40%  { background: var(--gold-bright); transform: scale(1.08); box-shadow: inset 0 0 0 2px var(--gold); }
    100% { background: #fbf3d8; transform: scale(1); box-shadow: none; }
  }
  table.scores td.has-input { position: relative; }
  .nice-pop {
    position: absolute;
    left: 50%; top: -6px;
    transform: translate(-50%, 0);
    background: linear-gradient(135deg, var(--gold-bright), var(--gold));
    color: #5a3a00;
    font-weight: 800;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 2px 8px;
    border-radius: 999px;
    white-space: nowrap;
    pointer-events: none;
    z-index: 5;
    box-shadow: 0 2px 6px rgba(0,0,0,0.25);
    animation: nicePop 1.1s cubic-bezier(.2,.8,.2,1) forwards;
  }
  @keyframes nicePop {
    0%   { opacity: 0; transform: translate(-50%, 4px) scale(0.8); }
    20%  { opacity: 1; transform: translate(-50%, -18px) scale(1.05); }
    80%  { opacity: 1; transform: translate(-50%, -34px) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -52px) scale(0.95); }
  }

  /* Ranking FLIP rows need position for safe transforms */
  .ranking-table tr { will-change: transform; }

  /* Team winner enter pulse (once) */
  .winner-enter { animation: winnerPulse 1.4s ease-out; }
  @keyframes winnerPulse {
    0%   { box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.85), var(--card-shadow-lg); transform: scale(1); }
    25%  { box-shadow: 0 0 0 14px rgba(255, 215, 0, 0), var(--card-shadow-lg); transform: scale(1.04); }
    60%  { transform: scale(0.995); }
    100% { transform: scale(1); }
  }

  /* MVP card enter */
  .mvp-card.mvp-enter { animation: mvpEnter 0.5s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes mvpEnter {
    from { opacity: 0; transform: scale(0.86) translateY(8px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* Verdict crossfade */
  #verdict.verdict-change { animation: verdictFade 0.45s ease; }
  @keyframes verdictFade {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Home: winner cards staggered rise + medal pop */
  .winner-card { animation: cardRise 0.55s cubic-bezier(.2,.8,.2,1) both; }
  @keyframes cardRise {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .number-medal { animation: medalPop 0.55s cubic-bezier(.34,1.56,.64,1) both; }
  @keyframes medalPop {
    0%   { opacity: 0; transform: scale(0.5); }
    60%  { opacity: 1; transform: scale(1.12); }
    100% { opacity: 1; transform: scale(1); }
  }

  /* Legacy history entries (imported past tournaments) */
  .legacy-badge {
    display: inline-block;
    background: #f0e6c8;
    color: #8a6d1a;
    font-size: 10px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    letter-spacing: 0.08em;
    margin-left: 4px;
  }
  .history-item { position: relative; }
  .history-actions {
    position: absolute;
    top: 8px; right: 8px;
    display: flex;
    gap: 4px;
  }
  .history-edit, .history-delete {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid rgba(0,0,0,0.1);
    background: #fffdf5;
    color: #9a8a6a;
    font-size: 14px;
    font-weight: 700;
    line-height: 1;
    cursor: pointer;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0;
  }
  .history-edit:hover { background: #fff4c8; color: var(--gold); border-color: var(--gold-light); }
  .history-delete { font-size: 16px; }
  .history-delete:hover { background: #ffe5e5; color: #c62828; border-color: #f3bbbb; }
  .history-editing { background: #fffef4; border: 1px dashed var(--gold); }
  .history-edit-form { flex: 1; min-width: 0; }
  .history-edit-title {
    font-size: 13px;
    color: var(--ink-soft);
    font-weight: 700;
    letter-spacing: 0.06em;
    margin-bottom: 8px;
  }

  /* Legacy add form */
  .legacy-add-wrap { margin-bottom: 16px; }
  .legacy-add-wrap > button { width: 100%; }
  .legacy-form {
    margin-top: 12px;
    background: var(--card-bg);
    border-radius: 12px;
    padding: 14px 16px;
    box-shadow: var(--card-shadow);
    border: 1px solid rgba(212, 160, 23, 0.2);
    animation: cardRise 0.4s cubic-bezier(.2,.8,.2,1) both;
  }
  .legacy-form[hidden] { display: none; }
  .legacy-form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px 12px;
  }
  @media (max-width: 520px) { .legacy-form-grid { grid-template-columns: 1fr; } }
  .legacy-form label {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--ink-soft);
    font-weight: 600;
  }
  .legacy-form input, .legacy-form select {
    flex: 1;
    min-width: 0;
    padding: 8px 10px;
    border: 1px solid #e6d9b0;
    border-radius: 6px;
    font-family: inherit;
    font-size: 15px;
    background: #fffef9;
    color: var(--ink);
  }
  .legacy-form input:focus, .legacy-form select:focus {
    outline: 2px solid var(--gold);
    outline-offset: -1px;
    border-color: var(--gold);
  }
  .legacy-form-actions { display: flex; gap: 8px; margin-top: 12px; }
  .legacy-form-actions .btn { flex: 1; }

  /* Respect reduced-motion preferences */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.01ms !important;
    }
    .home-hero .ball, .trophy, .mvp-card .star { animation: none !important; }
    .nav-indicator { transition: none !important; }
  }
</style>

<canvas id="confettiCanvas"></canvas>

<script>
const MEMBERS = ['まさき', 'くみこ', 'かずき', 'だいき', 'のぶき', 'りこ', 'しいか'];
const HOLES = 18;
const STORAGE_KEY = 'golfFamilyData_v2';
const LEGACY_KEY = 'golfFamilyData_v1';

/* =======================================================================
   クラウド同期 (Firebase Realtime Database)
   -----------------------------------------------------------------------
   下の FIREBASE_CONFIG に Firebase プロジェクトの設定を貼り付けると、
   URL を知っている全員でスコア・編成・日程などがリアルタイムに共有されます。
   未設定のままだと、従来どおりブラウザのローカル保存だけになります。

   セットアップ手順:
   1. https://console.firebase.google.com/ で新しいプロジェクトを作成
   2. 「Realtime Database」を有効化 (ロケーションは asia-southeast1 推奨)
   3. ルールを一時的に { "rules": { ".read": true, ".write": true } } に設定
   4. プロジェクト設定 → 全般 → ウェブアプリを追加して config をコピー
   5. 下の FIREBASE_CONFIG に貼り付けてデプロイ
   ======================================================================= */
const FIREBASE_CONFIG = {
  apiKey: "",
  authDomain: "",
  databaseURL: "",
  projectId: "",
};
const SYNC_ROOM_ID = 'family-main';

const CLIENT_ID = Math.random().toString(36).slice(2, 10);
let cloudRef = null;
let cloudConnectedRef = null;
let lastWriteToken = null;
let pendingPushTimer = null;
let remoteApplyInProgress = false;

const LEGACY_SEED = [
  { number: 1, individualWinner: 'くみこ' },
  { number: 2, individualWinner: 'のぶき' },
  { number: 3, individualWinner: 'まさき' },
  { number: 4, individualWinner: 'まさき' },
];

let state = loadState();
seedLegacyWinners();

function seedLegacyWinners() {
  if (state.legacySeeded) return;
  for (const entry of LEGACY_SEED) {
    const alreadyHas = state.history.some(h => h.number === entry.number);
    if (alreadyHas) continue;
    state.history.push({
      id: 'legacy-' + entry.number,
      number: entry.number,
      date: '',
      venue: '',
      individualWinner: entry.individualWinner,
      legacy: true,
      finishedAt: null,
    });
  }
  state.history.sort((a, b) => b.number - a.number);
  const maxN = state.history.reduce((m, h) => Math.max(m, h.number), 0);
  if (state.current.number <= maxN) state.current.number = maxN + 1;
  state.legacySeeded = true;
  saveState();
}

function emptyCurrent(number) {
  const today = new Date().toISOString().slice(0, 10);
  return {
    number: number,
    date: today,
    venue: '',
    teams: Object.fromEntries(MEMBERS.map(m => [m, null])),
    scores: Object.fromEntries(MEMBERS.map(m => [m, Array(HOLES).fill(null)])),
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.current && parsed.history) return parsed;
    }
  } catch (e) {}
  try {
    const legacy = localStorage.getItem(LEGACY_KEY);
    if (legacy) {
      const parsed = JSON.parse(legacy);
      if (parsed.teams && parsed.scores) {
        const cur = emptyCurrent(1);
        cur.teams = parsed.teams;
        cur.scores = parsed.scores;
        return { current: cur, history: [] };
      }
    }
  } catch (e) {}
  return { current: emptyCurrent(1), history: [] };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  if (!remoteApplyInProgress) pushToCloud();
}

function isCloudConfigured() {
  return !!(FIREBASE_CONFIG.databaseURL && FIREBASE_CONFIG.databaseURL.startsWith('http'));
}

function setSyncBadge(stateName, label) {
  const el = document.getElementById('syncBadge');
  if (!el) return;
  el.classList.remove('state-local', 'state-connecting', 'state-connected');
  el.classList.add('state-' + stateName);
  const lbl = el.querySelector('.label');
  if (lbl) lbl.textContent = label;
}

function sanitizeRemoteState(remote) {
  if (!remote || typeof remote !== 'object') return null;
  const current = remote.current && typeof remote.current === 'object' ? remote.current : null;
  if (!current) return null;
  const teams = {};
  const scores = {};
  for (const m of MEMBERS) {
    teams[m] = (current.teams && (current.teams[m] === 'A' || current.teams[m] === 'B')) ? current.teams[m] : null;
    const raw = current.scores && current.scores[m];
    const arr = Array(HOLES).fill(null);
    if (raw) {
      // Firebase returns either an array or an object keyed by index.
      for (let i = 0; i < HOLES; i++) {
        const v = Array.isArray(raw) ? raw[i] : raw[i] ?? raw[String(i)];
        arr[i] = (typeof v === 'number' && v > 0) ? v : null;
      }
    }
    scores[m] = arr;
  }
  const sanitizedCurrent = {
    number: Number(current.number) > 0 ? Number(current.number) : 1,
    date: typeof current.date === 'string' ? current.date : '',
    venue: typeof current.venue === 'string' ? current.venue : '',
    teams,
    scores,
  };
  const history = Array.isArray(remote.history) ? remote.history.filter(h => h && typeof h === 'object') : [];
  return {
    current: sanitizedCurrent,
    history,
    legacySeeded: !!remote.legacySeeded,
  };
}

function statesEqual(a, b) {
  try { return JSON.stringify(a) === JSON.stringify(b); } catch (e) { return false; }
}

function captureFocus() {
  const el = document.activeElement;
  if (!el || el === document.body) return null;
  const sel = { caretStart: null, caretEnd: null };
  try { sel.caretStart = el.selectionStart; sel.caretEnd = el.selectionEnd; } catch (e) {}
  if (el.dataset && el.dataset.m != null && el.dataset.h != null) {
    return { kind: 'score', m: el.dataset.m, h: el.dataset.h, ...sel };
  }
  if (el.id) return { kind: 'id', id: el.id, ...sel };
  return null;
}

function restoreFocus(info) {
  if (!info) return;
  let el = null;
  if (info.kind === 'score') {
    el = document.querySelector(`table.scores input[data-m="${CSS.escape(info.m)}"][data-h="${info.h}"]`);
  } else if (info.kind === 'id') {
    el = document.getElementById(info.id);
  }
  if (!el) return;
  try { el.focus({ preventScroll: true }); } catch (e) { el.focus(); }
  if (info.caretStart != null && typeof el.setSelectionRange === 'function') {
    try { el.setSelectionRange(info.caretStart, info.caretEnd); } catch (e) {}
  }
}

function applyRemoteState(remote) {
  const sanitized = sanitizeRemoteState(remote);
  if (!sanitized) return;
  if (statesEqual(state, sanitized)) return;
  const focus = captureFocus();
  remoteApplyInProgress = true;
  state = sanitized;
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  renderAll();
  remoteApplyInProgress = false;
  restoreFocus(focus);
}

function pushToCloud() {
  if (!cloudRef) return;
  if (pendingPushTimer) clearTimeout(pendingPushTimer);
  pendingPushTimer = setTimeout(() => {
    pendingPushTimer = null;
    if (!cloudRef) return;
    lastWriteToken = CLIENT_ID + '-' + Date.now() + '-' + Math.random().toString(36).slice(2, 6);
    const payload = {
      current: state.current,
      history: state.history,
      legacySeeded: !!state.legacySeeded,
      _writer: lastWriteToken,
      _updatedAt: Date.now(),
    };
    cloudRef.set(payload).catch(err => {
      console.warn('[sync] write failed:', err);
    });
  }, 220);
}

function initCloudSync() {
  if (!isCloudConfigured()) {
    setSyncBadge('local', 'ローカル');
    console.info('[sync] Firebase 未設定 — ローカル保存のみで動作します。');
    return;
  }
  if (typeof firebase === 'undefined' || !firebase.initializeApp) {
    setSyncBadge('local', 'SDK未ロード');
    console.warn('[sync] Firebase SDK が読み込まれていません。');
    return;
  }
  setSyncBadge('connecting', '接続中...');
  try {
    if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
    const db = firebase.database();
    cloudRef = db.ref('rooms/' + SYNC_ROOM_ID);
    cloudConnectedRef = db.ref('.info/connected');

    cloudConnectedRef.on('value', (snap) => {
      if (snap.val() === true) {
        setSyncBadge('connected', '同期中');
      } else {
        setSyncBadge('connecting', '再接続中...');
      }
    });

    let firstSnapshot = true;
    cloudRef.on('value', (snap) => {
      const data = snap.val();
      if (firstSnapshot) {
        firstSnapshot = false;
        if (!data) {
          // First user — seed the room with current local state.
          pushToCloud();
          return;
        }
      }
      if (!data) return;
      // Ignore the echo of our own write.
      if (data._writer && data._writer === lastWriteToken) return;
      applyRemoteState(data);
    }, (err) => {
      console.warn('[sync] read failed:', err);
      setSyncBadge('local', '同期失敗');
    });
  } catch (e) {
    console.warn('[sync] init failed:', e);
    setSyncBadge('local', '同期失敗');
  }
}

function totalOf(member) {
  return state.current.scores[member].reduce((s, v) => s + (v || 0), 0);
}

function holesDone(member) {
  return state.current.scores[member].filter(v => v != null).length;
}

function setTeam(member, team) {
  state.current.teams[member] = state.current.teams[member] === team ? null : team;
  saveState();
  renderTeams();
  renderScoreTable();
  renderRanking();
  renderHome();
}

function setScore(member, holeIndex, raw) {
  const prev = state.current.scores[member][holeIndex];
  let next;
  if (raw === '' || raw == null) {
    next = null;
  } else {
    const n = Number(raw);
    next = Number.isFinite(n) && n > 0 ? n : null;
  }
  state.current.scores[member][holeIndex] = next;
  saveState();
  updateTotalCell(member, prev, next, holeIndex);
  renderRanking();
  renderHome();
}

function updateTotalCell(member, prevVal, nextVal, holeIndex) {
  const cell = document.getElementById('total-' + member);
  if (!cell) return;
  const from = Number(cell.dataset.total || 0);
  const to = totalOf(member);
  if (from !== to) {
    countUp(cell, from, to, 320);
    cell.dataset.total = String(to);
    cell.classList.remove('cell-flash');
    void cell.offsetWidth;
    cell.classList.add('cell-flash');
    setTimeout(() => cell.classList.remove('cell-flash'), 700);
    haptic(10);
  } else {
    cell.textContent = to || '-';
  }
  // Nice-pop for eagles / hole-in-ones (when the new input is 1 or 2, not on clear)
  if (nextVal && (nextVal === 1 || nextVal === 2) && nextVal !== prevVal) {
    const input = document.querySelector(`table.scores input[data-m="${CSS.escape(member)}"][data-h="${holeIndex}"]`);
    const td = input ? input.parentElement : null;
    if (td) {
      td.classList.add('has-input');
      const pop = document.createElement('span');
      pop.className = 'nice-pop';
      pop.textContent = nextVal === 1 ? 'ホールインワン🎯' : 'ナイス!';
      td.appendChild(pop);
      setTimeout(() => pop.remove(), 1200);
    }
  }
}

function medalHTML(n, small) {
  return `<div class="number-medal ${small ? 'small' : ''}"><span class="kai-label">第</span><span class="kai-num">${n}</span><span class="kai-label">回</span></div>`;
}

function renderHome() {
  const cur = state.current;
  const el = document.getElementById('homeCurrent');
  const aCount = MEMBERS.filter(m => cur.teams[m] === 'A').length;
  const bCount = MEMBERS.filter(m => cur.teams[m] === 'B').length;
  const anyScore = MEMBERS.some(m => holesDone(m) > 0);
  el.innerHTML = `
    <div class="current-head">
      ${medalHTML(cur.number)}
      <div class="title">
        <h3>開催中の大会</h3>
        <div class="home-meta">📅 ${cur.date || '(日付未設定)'} / 📍 ${cur.venue || '(会場未設定)'}</div>
      </div>
    </div>
    <div class="home-meta">👥 A ${aCount}人 / B ${bCount}人</div>
    <div class="home-meta">⛳ ${anyScore ? 'スコア入力中' : '未開始'}</div>
  `;

  const gallery = document.getElementById('homeWinnersGallery');
  if (!state.history.length) {
    gallery.innerHTML = '<div class="home-card"><div class="home-empty">履歴はまだありません。大会を終了すると記録されます。</div></div>';
  } else {
    const recent = state.history.slice(0, 3);
    gallery.innerHTML = recent.map((h, i) => {
      if (h.legacy) {

function renderScoreTable() {

    { team: 'A',  label: 'A チーム',  rowCls: 'team-row-A',    memberCls: 'member-A',    color: '#3b82f6' },
    { team: 'B',  label: 'B チーム',  rowCls: 'team-row-B',    memberCls: 'member-B',    color: '#ef4444' },

function computeTotals() {
  let aTotal = 0, bTotal = 0;
  const aMembers = [], bMembers = [];
  MEMBERS.forEach(m => {
    const t = state.current.teams[m];
    if (t === 'A') { aTotal += totalOf(m); aMembers.push(m); }
    if (t === 'B') { bTotal += totalOf(m); bMembers.push(m); }
  });
  return { aTotal, bTotal, aMembers, bMembers };
}

const _prev = { aTotal: 0, bTotal: 0, aWin: false, bWin: false, verdict: '', mvp: null };

function renderRanking() {
  const teamResult = document.getElementById('teamResult');
  const verdict = document.getElementById('verdict');
  const { aTotal, bTotal, aMembers, bMembers } = computeTotals();
  const hasAny = aTotal > 0 || bTotal > 0;
  const bothStarted = aTotal > 0 && bTotal > 0;
  const aWin = bothStarted && aTotal < bTotal;
  const bWin = bothStarted && bTotal < aTotal;
  const aEntered = !_prev.aWin && aWin;
  const bEntered = !_prev.bWin && bWin;
  teamResult.innerHTML = `
    <div class="bg-A ${aWin ? 'winner' : ''} ${aEntered ? 'winner-enter' : ''}">
      <h4>A チーム (${aMembers.length}人)</h4>
      <div class="members">${aMembers.join(' / ') || '未設定'}</div>
      <div class="score" data-team="A">0</div>
      ${aWin ? '<div class="winner-badge">WINNER 優勝</div>' : ''}
    </div>
    <div class="bg-B ${bWin ? 'winner' : ''} ${bEntered ? 'winner-enter' : ''}">
      <h4>B チーム (${bMembers.length}人)</h4>
      <div class="members">${bMembers.join(' / ') || '未設定'}</div>
      <div class="score" data-team="B">0</div>
      ${bWin ? '<div class="winner-badge">WINNER 優勝</div>' : ''}
    </div>`;
  const aScoreEl = teamResult.querySelector('[data-team="A"]');
  const bScoreEl = teamResult.querySelector('[data-team="B"]');
  if (aScoreEl) countUp(aScoreEl, _prev.aTotal, aTotal, 420);
  if (bScoreEl) countUp(bScoreEl, _prev.bTotal, bTotal, 420);

  let verdictText;
  if (!hasAny) {
    verdictText = 'スコアを入力すると結果が表示されます';
    verdict.style.color = '#888';
  } else if (!bothStarted) {
    verdictText = '両チームのスコアが入ると勝敗が出ます';
    verdict.style.color = '#888';
  } else if (aTotal === bTotal) {
    verdictText = '🤝 現在タイ';
    verdict.style.color = '#555';
  } else {
    const winner = aWin ? 'A' : 'B';
    const diff = Math.abs(aTotal - bTotal);
    verdictText = `__TROPHY__ ${winner} チームが ${diff} 打リード (合計打数が少ない方が勝ち)`;
    verdict.style.color = aWin ? '#1e40af' : '#b91c1c';
  }
  if (verdictText !== _prev.verdict) {
    if (verdictText.startsWith('__TROPHY__')) {
      verdict.innerHTML = '<span class="trophy">🏆</span>' + verdictText.slice('__TROPHY__'.length);
    } else {
      verdict.textContent = verdictText;
    }
    verdict.classList.remove('verdict-change');
    void verdict.offsetWidth;
    verdict.classList.add('verdict-change');
  }

  const ranked = MEMBERS
    .map(m => ({ name: m, team: state.current.teams[m], total: totalOf(m), holes: holesDone(m) }))
    .filter(x => x.holes > 0)
    .sort((a, b) => a.total - b.total);

  const mvpEl = document.getElementById('mvpCard');
  if (ranked.length > 0) {
    const mvp = ranked[0];
    const isNew = _prev.mvp !== mvp.name;
    mvpEl.innerHTML = `
      <div class="mvp-card ${isNew ? 'mvp-enter' : ''}">
        <span class="star">⭐</span>
        <div class="info">
          <div class="label">MVP</div>
          <div class="name">${mvp.name}</div>
        </div>
        <div class="score">${mvp.total}<small>${mvp.holes}/${HOLES} ホール</small></div>
      </div>`;
    _prev.mvp = mvp.name;
  } else {
    mvpEl.innerHTML = '';
    _prev.mvp = null;
  }

  const tbl = document.getElementById('individualTable');
  if (ranked.length === 0) {
    tbl.innerHTML = '<tr><td style="padding:16px;color:#888">スコアを入力するとランキングが表示されます</td></tr>';
    _prev.aTotal = aTotal; _prev.bTotal = bTotal;
    _prev.aWin = aWin; _prev.bWin = bWin;
    _prev.verdict = verdictText;
    return;
  }

  flipRows(tbl, 'tr[data-key]', () => {
    let html = '<thead><tr><th class="rank">#</th><th>名前</th><th>チーム</th><th>スコア</th><th>消化</th></tr></thead><tbody>';
    ranked.forEach((r, i) => {
      const teamLabel = r.team ? `${r.team}チーム` : '-';
      const cls = i === 0 ? 'top1' : '';
      html += `<tr class="${cls}" data-key="${r.name}"><td class="rank">${i + 1}</td><td>${r.name}</td><td>${teamLabel}</td><td>${r.total}</td><td>${r.holes}/${HOLES}</td></tr>`;
    });
    html += '</tbody>';
    tbl.innerHTML = html;
  });

  _prev.aTotal = aTotal; _prev.bTotal = bTotal;
  _prev.aWin = aWin; _prev.bWin = bWin;
  _prev.verdict = verdictText;
}

function deleteHistory(id) {
  const entry = state.history.find(h => h.id === id);
  if (!entry) return;
  const label = entry.legacy
    ? `第${entry.number}回 (${entry.individualWinner || '-'} 優勝)`
    : `第${entry.number}回`;
  if (!confirm(`${label} を履歴から削除します。よろしいですか?`)) return;
  state.history = state.history.filter(h => h.id !== id);
  saveState();
  renderHistory();
  renderHome();
  haptic(12);
}

function addLegacyTournament(number, winner, date, venue, winnerScore) {
  const n = Number(number);
  if (!Number.isFinite(n) || n <= 0) { alert('第何回か正しい数字を入力してください'); return false; }
  if (state.history.some(h => h.number === n)) {
    if (!confirm(`第${n}回は既に履歴にあります。それでも追加しますか?`)) return false;
  }
  const score = winnerScore ? Number(winnerScore) : null;
  state.history.push({
    id: 'legacy-' + n + '-' + Date.now(),
    number: n,
    date: date || '',
    venue: venue || '',
    individualWinner: winner || '',
    winnerScore: Number.isFinite(score) && score > 0 ? score : null,
    legacy: true,
    finishedAt: null,
  });
  state.history.sort((a, b) => b.number - a.number);
  const maxN = state.history.reduce((m, h) => Math.max(m, h.number), 0);
  if (state.current.number <= maxN) state.current.number = maxN + 1;
  saveState();
  renderHistory();
  renderHome();
  haptic(14);
  return true;
}

let _editingHistoryId = null;

function beginEditHistory(id) {
  _editingHistoryId = id;
  renderHistory();
  setTimeout(() => {
    const f = document.getElementById('editHistoryForm');
    if (f) {
      const first = f.querySelector('input, select');
      if (first) first.focus();
    }
  }, 0);
}

function cancelEditHistory() {
  _editingHistoryId = null;
  renderHistory();
}

function saveEditHistory(id, patch) {
  const entry = state.history.find(h => h.id === id);
  if (!entry) return;
  if (patch.number != null) {
    const n = Number(patch.number);
    if (!Number.isFinite(n) || n <= 0) { alert('第何回か正しい数字を入力してください'); return; }
    entry.number = n;
  }
  if ('individualWinner' in patch) entry.individualWinner = patch.individualWinner || '';
  if ('date' in patch) entry.date = patch.date || '';
  if ('venue' in patch) entry.venue = patch.venue || '';
  if ('winnerScore' in patch) {
    const score = patch.winnerScore ? Number(patch.winnerScore) : null;
    entry.winnerScore = Number.isFinite(score) && score > 0 ? score : null;
  }
  state.history.sort((a, b) => b.number - a.number);
  const maxN = state.history.reduce((m, h) => Math.max(m, h.number), 0);
  if (state.current.number <= maxN) state.current.number = maxN + 1;
  _editingHistoryId = null;
  saveState();
  renderHistory();
  renderHome();
  haptic(14);
}

function finalizeTournament() {
  const cur = state.current;
  const anyScore = MEMBERS.some(m => holesDone(m) > 0);
  if (!anyScore) {
    alert('スコアが入っていません。終了できません。');
    return;
  }
  if (!confirm(`第${cur.number}回大会を終了して履歴に保存しますか？\n(終了すると現在のスコアはクリアされ、新しい大会が始まります)`)) return;

  const { aTotal, bTotal } = computeTotals();
  let winnerTeam = null;
  if (aTotal > 0 && bTotal > 0) {
    if (aTotal < bTotal) winnerTeam = 'A';
    else if (bTotal < aTotal) winnerTeam = 'B';
  }
  const ranked = MEMBERS
    .map(m => ({ name: m, total: totalOf(m), holes: holesDone(m) }))
    .filter(x => x.holes > 0)
    .sort((a, b) => a.total - b.total);
  const mvp = ranked[0] || null;

  const record = {
    id: Date.now().toString(),
    number: cur.number,
    date: cur.date,
    venue: cur.venue,
    teams: JSON.parse(JSON.stringify(cur.teams)),
    scores: JSON.parse(JSON.stringify(cur.scores)),
    totalA: aTotal,
    totalB: bTotal,
    winnerTeam: winnerTeam,
    mvp: mvp ? mvp.name : null,
    mvpScore: mvp ? mvp.total : null,
    finishedAt: new Date().toISOString(),
  };
  state.history.unshift(record);
  state.current = emptyCurrent(cur.number + 1);
  saveState();
  renderAll();
  if (winnerTeam) confetti.fire();
  switchTab('history');
  setTimeout(() => {
    alert(`第${record.number}回大会を履歴に保存しました。`);
  }, 50);
}

const TAB_ORDER = ['home', 'setup', 'scores', 'ranking', 'history'];
let currentTab = 'home';

function switchTab(name) {
  if (!TAB_ORDER.includes(name)) return;
  const fromIdx = TAB_ORDER.indexOf(currentTab);
  const toIdx = TAB_ORDER.indexOf(name);
  const dir = toIdx > fromIdx ? 'slide-right' : (toIdx < fromIdx ? 'slide-left' : null);
  currentTab = name;
  document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('section').forEach(s => {
    s.classList.remove('active', 'slide-right', 'slide-left');
    if (s.id === 'tab-' + name) {
      void s.offsetWidth;
      s.classList.add('active');
      if (dir) s.classList.add(dir);
    }
  });
  updateNavIndicator();
  haptic(8);
}

function updateNavIndicator() {
  const nav = document.querySelector('nav');
  const ind = document.getElementById('navIndicator');
  if (!nav || !ind) return;
  const active = nav.querySelector('button.active');
  if (!active) { ind.style.width = '0'; return; }
  const navRect = nav.getBoundingClientRect();
  const btnRect = active.getBoundingClientRect();
  const left = btnRect.left - navRect.left;
  const width = btnRect.width;
  ind.style.transform = `translateX(${left}px)`;
  ind.style.width = width + 'px';
}

/* ---------- Confetti ---------- */
const confetti = (() => {
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  const COLORS = ['#ffd700', '#f5c048', '#d4a017', '#3b82f6', '#ef4444', '#2d5016', '#fff'];
  let pieces = [];
  let raf = null;
  let running = false;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function spawn(count) {
    const W = canvas.width;
    for (let i = 0; i < count; i++) {
      pieces.push({
        x: Math.random() * W,
        y: -20 - Math.random() * 200,
        w: 6 + Math.random() * 6,
        h: 8 + Math.random() * 8,
        vx: -2 + Math.random() * 4,
        vy: 2 + Math.random() * 4,
        rot: Math.random() * Math.PI * 2,
        vr: -0.2 + Math.random() * 0.4,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        life: 260 + Math.random() * 160,
      });
    }
  }

  function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05;
      p.rot += p.vr;
      p.life -= 1;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    pieces = pieces.filter(p => p.life > 0 && p.y < canvas.height + 40);
    if (pieces.length > 0) {
      raf = requestAnimationFrame(tick);
    } else {
      running = false;
      canvas.style.display = 'none';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }

  function fire() {
    resize();
    canvas.style.display = 'block';
    spawn(120);
    setTimeout(() => spawn(80), 250);
    setTimeout(() => spawn(60), 550);
    if (!running) {
      running = true;
      raf = requestAnimationFrame(tick);
    }
  }

  window.addEventListener('resize', () => { if (running) resize(); });
  return { fire };
})();

  const toggle = document.getElementById('legacyAddToggle');
  const form = document.getElementById('legacyAddForm');
  const cancel = document.getElementById('legacyAddCancel');
  const select = form.querySelector('select[name="winner"]');
  MEMBERS.forEach(m => {
    const opt = document.createElement('option');
    opt.value = m; opt.textContent = m;
    select.appendChild(opt);
  });
  const numberInput = form.querySelector('input[name="number"]');
  function openForm() {
    const maxN = state.history.reduce((m, h) => Math.max(m, h.number), 0);
    numberInput.value = maxN + 1;
    form.hidden = false;
    toggle.hidden = true;
    numberInput.focus();
  }
  function closeForm() {
    form.hidden = true;
    toggle.hidden = false;
    form.reset();
  }
  toggle.onclick = openForm;
  cancel.onclick = closeForm;
  form.onsubmit = (e) => {
    e.preventDefault();
    const fd = new FormData(form);
    const ok = addLegacyTournament(
      fd.get('number'),
      fd.get('winner'),
      fd.get('date'),
      fd.get('venue'),
      fd.get('winnerScore')
    );
    if (ok) closeForm();
  };
})();

function renderAll() {
  renderHome();
  renderSetupInputs();
  renderTeams();
  renderScoreTable();
  renderRanking();
  renderHistory();
}

/* ---------- Dynamic UX utilities ---------- */

const prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function haptic(ms = 10) {
  if (prefersReducedMotion) return;
  try { if (navigator.vibrate) navigator.vibrate(ms); } catch (e) {}
}

function countUp(el, from, to, dur = 300) {
  if (prefersReducedMotion || from === to) { el.textContent = to || '-'; return; }
  const start = performance.now();
  function step(now) {
    const t = Math.min(1, (now - start) / dur);
    const eased = 1 - Math.pow(1 - t, 3);
    const v = Math.round(from + (to - from) * eased);
    el.textContent = v || '-';
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}

function flipRows(container, selector, mutate) {
  if (prefersReducedMotion) { mutate(); return; }
  const before = new Map();
  container.querySelectorAll(selector).forEach(r => {
    before.set(r.dataset.key, r.getBoundingClientRect().top);
  });
  mutate();
  const after = container.querySelectorAll(selector);
  after.forEach(r => {
    const first = before.get(r.dataset.key);
    if (first == null) return;
    const last = r.getBoundingClientRect().top;
    const dy = first - last;
    if (!dy) return;
    r.style.transform = `translateY(${dy}px)`;
    r.style.transition = 'transform 0s';
    requestAnimationFrame(() => {
      r.style.transition = 'transform 0.45s cubic-bezier(.2,.8,.2,1)';
      r.style.transform = '';
      setTimeout(() => { r.style.transition = ''; }, 500);
    });
  });
}

/* Ripple effect on tactile buttons */
function spawnRipple(e) {
  const btn = e.currentTarget;
  const rect = btn.getBoundingClientRect();
  const point = e.touches ? e.touches[0] : e;
  const x = (point.clientX || rect.left + rect.width / 2) - rect.left;
  const y = (point.clientY || rect.top + rect.height / 2) - rect.top;
  const size = Math.max(rect.width, rect.height) * 0.9;
  const r = document.createElement('span');
  r.className = 'ripple';
  r.style.left = x + 'px';
  r.style.top = y + 'px';
  r.style.width = r.style.height = size + 'px';
  btn.appendChild(r);
  setTimeout(() => r.remove(), 600);
}
document.addEventListener('pointerdown', (e) => {
  const btn = e.target.closest('.btn, .btn-danger, nav button, .team-buttons button');
  if (btn) spawnRipple({ currentTarget: btn, clientX: e.clientX, clientY: e.clientY });
});

/* Team pick and finalize haptic */
document.addEventListener('click', (e) => {
  if (e.target.closest('.team-buttons button')) haptic(12);
  if (e.target.closest('#finalizeBtn')) haptic(18);
  if (e.target.closest('#resetBtn')) haptic(14);
});

/* Swipe between tabs on <main> */
(function enableSwipe() {
  const main = document.querySelector('main');
  if (!main) return;
  let sx = 0, sy = 0, tracking = false, ignore = false;
  main.addEventListener('touchstart', (e) => {
    if (e.touches.length !== 1) { tracking = false; return; }
    const t = e.touches[0];
    sx = t.clientX; sy = t.clientY;
    ignore = !!e.target.closest('.score-table-wrap, input, textarea');
    tracking = true;
  }, { passive: true });
  main.addEventListener('touchend', (e) => {
    if (!tracking || ignore) { tracking = false; return; }
    const t = (e.changedTouches && e.changedTouches[0]);
    if (!t) return;
    const dx = t.clientX - sx;
    const dy = t.clientY - sy;
    tracking = false;
    if (Math.abs(dx) < 60) return;
    if (Math.abs(dx) < Math.abs(dy) * 1.5) return;
    const idx = TAB_ORDER.indexOf(currentTab);
    const target = dx < 0 ? TAB_ORDER[idx + 1] : TAB_ORDER[idx - 1];
    if (target) switchTab(target);
  }, { passive: true });
})();

/* Subtle parallax on body background */
if (!prefersReducedMotion) {
  let ticking = false;
  window.addEventListener('scroll', () => {
    if (ticking) return;
    ticking = true;
    requestAnimationFrame(() => {
      document.body.style.backgroundPositionY = (window.scrollY * 0.15) + 'px';
      ticking = false;
    });
  }, { passive: true });
}

renderAll();
initCloudSync();
requestAnimationFrame(updateNavIndicator);
window.addEventListener('load', updateNavIndicator);
</script>
