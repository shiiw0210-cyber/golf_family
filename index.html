<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#2d5016">
<title>家族ゴルフ大会</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #f4f6f1;
    color: #222;
    padding-bottom: calc(76px + env(safe-area-inset-bottom));
    -webkit-text-size-adjust: 100%;
  }
  header {
    background: #2d5016;
    color: #fff;
    padding: 14px 16px calc(14px + env(safe-area-inset-top));
    padding-top: calc(14px + env(safe-area-inset-top));
    position: sticky;
    top: 0;
    z-index: 20;
  }
  header h1 { margin: 0; font-size: 18px; line-height: 1.3; }

  /* Bottom nav (mobile-first) */
  nav.bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: flex;
    background: #fff;
    border-top: 1px solid #ddd;
    box-shadow: 0 -2px 8px rgba(0,0,0,0.05);
    z-index: 30;
    padding-bottom: env(safe-area-inset-bottom);
  }
  nav.bottom-nav button {
    flex: 1;
    background: none;
    border: none;
    padding: 10px 4px 8px;
    font-size: 12px;
    color: #777;
    cursor: pointer;
    line-height: 1.2;
    min-height: 56px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
  }
  nav.bottom-nav button .icon { font-size: 22px; line-height: 1; }
  nav.bottom-nav button.active { color: #2d5016; font-weight: bold; }
  nav.bottom-nav button.active .icon { transform: scale(1.05); }

  main { padding: 14px; max-width: 960px; margin: 0 auto; }
  section { display: none; }
  section.active { display: block; }
  h2 { margin: 0 0 12px; font-size: 18px; }
  h3 { margin: 20px 0 8px; font-size: 14px; color: #444; }
  .note {
    background: #fff8dc;
    padding: 10px 12px;
    border-radius: 6px;
    font-size: 13px;
    margin: 0 0 12px;
    border-left: 4px solid #d4a017;
    line-height: 1.5;
  }

  /* Teams */
  .team-grid { display: grid; gap: 8px; grid-template-columns: 1fr; }
  @media (min-width: 600px) { .team-grid { grid-template-columns: 1fr 1fr; } }
  .member-card {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff;
    padding: 12px 14px;
    border-radius: 8px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }
  .member-name { font-size: 16px; font-weight: 500; }
  .team-buttons { display: flex; gap: 6px; }
  .team-buttons button {
    min-width: 48px;
    min-height: 44px;
    padding: 6px 14px;
    border: 2px solid #ddd;
    background: #fff;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
    font-size: 16px;
    color: #555;
  }
  .team-buttons button.team-A.selected { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  .team-buttons button.team-B.selected { background: #ef4444; color: #fff; border-color: #ef4444; }
  .team-summary { display: flex; gap: 10px; margin-top: 16px; }
  .team-summary > div {
    flex: 1;
    padding: 12px;
    border-radius: 6px;
    text-align: center;
    color: #fff;
    font-weight: bold;
    font-size: 14px;
  }
  .bg-A { background: #3b82f6; }
  .bg-B { background: #ef4444; }

  /* Score view toggle */
  .view-toggle {
    display: flex;
    gap: 0;
    background: #e8e8df;
    border-radius: 8px;
    padding: 4px;
    margin-bottom: 12px;
  }
  .view-toggle button {
    flex: 1;
    background: transparent;
    border: none;
    padding: 10px 4px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    color: #555;
    cursor: pointer;
    min-height: 40px;
  }
  .view-toggle button.active { background: #fff; color: #2d5016; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }

  /* Score table */
  .score-table-wrap {
    overflow-x: auto;
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
    -webkit-overflow-scrolling: touch;
  }
  table.scores { border-collapse: separate; border-spacing: 0; width: 100%; }
  table.scores th, table.scores td {
    border-right: 1px solid #ececec;
    border-bottom: 1px solid #ececec;
    padding: 0;
    text-align: center;
    font-size: 13px;
    background: #fff;
  }
  table.scores thead th {
    background: #ecebe2;
    font-weight: 600;
    padding: 8px 2px;
    position: sticky;
    top: 0;
    z-index: 2;
  }
  table.scores th.name-col, table.scores td.name-col {
    position: sticky;
    left: 0;
    z-index: 3;
    text-align: left;
    padding: 8px 10px;
    white-space: nowrap;
    min-width: 88px;
    font-weight: 500;
    box-shadow: 2px 0 4px -2px rgba(0,0,0,0.15);
  }
  table.scores thead th.name-col { z-index: 4; background: #ecebe2; }
  table.scores tbody td.name-col { background: #fafaf3; }
  table.scores input {
    width: 100%;
    min-width: 44px;
    height: 44px;
    border: none;
    background: transparent;
    text-align: center;
    font-size: 16px;
    padding: 0;
    -moz-appearance: textfield;
  }
  table.scores input::-webkit-outer-spin-button,
  table.scores input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  table.scores input:focus { outline: 2px solid #2d5016; background: #fffde7; border-radius: 2px; }
  table.scores td.subtotal {
    background: #f6f6ef;
    font-weight: bold;
    min-width: 48px;
    padding: 8px 4px;
    color: #2d5016;
  }
  table.scores td.total {
    background: #eef3e3;
    font-weight: bold;
    min-width: 52px;
    padding: 8px 4px;
    font-size: 14px;
    color: #1e3a07;
  }
  .team-badge {
    display: inline-block;
    width: 10px;
    height: 10px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }

  .btn-danger {
    background: #c62828;
    color: #fff;
    border: none;
    padding: 12px 16px;
    border-radius: 6px;
    cursor: pointer;
    margin-top: 16px;
    font-size: 14px;
    min-height: 44px;
  }

  /* Ranking */
  .team-result { display: flex; gap: 10px; margin-bottom: 8px; }
  .team-result > div {
    flex: 1;
    padding: 18px 10px;
    border-radius: 10px;
    color: #fff;
    text-align: center;
  }
  .team-result h4 { margin: 0 0 6px; font-size: 15px; }
  .team-result .members { font-size: 12px; opacity: 0.95; min-height: 18px; line-height: 1.4; }
  .team-result .score { font-size: 30px; font-weight: bold; margin-top: 8px; line-height: 1; }
  .winner { outline: 4px solid #ffd700; outline-offset: -4px; }
  .verdict {
    text-align: center;
    font-weight: bold;
    margin: 14px 0 22px;
    font-size: 15px;
    line-height: 1.5;
  }
  .ranking-table {
    width: 100%;
    background: #fff;
    border-collapse: collapse;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 1px 2px rgba(0,0,0,0.06);
  }
  .ranking-table th, .ranking-table td {
    padding: 12px 8px;
    border-bottom: 1px solid #eee;
    text-align: left;
    font-size: 14px;
  }
  .ranking-table th { background: #ecebe2; font-size: 13px; }
  .ranking-table .rank { width: 36px; text-align: center; font-weight: bold; }
  .ranking-table .num { text-align: right; font-variant-numeric: tabular-nums; }
  .ranking-table tr.top1 td { background: #fffbea; font-weight: bold; }

  @media (max-width: 360px) {
    header h1 { font-size: 16px; }
    .team-result .score { font-size: 26px; }
  }
</style>
</head>
<body>

<header>
  <h1>⛳ 家族ゴルフ大会</h1>
</header>

<main>
  <section id="tab-teams" class="active">
    <h2>チーム編成</h2>
    <p class="note">各メンバーを A / B のどちらかに割り当ててください。同じボタンをもう一度押すと解除できます。3対4 での対抗戦を想定。</p>
    <div class="team-grid" id="teamGrid"></div>
    <div class="team-summary">
      <div class="bg-A">A チーム <span id="countA">0</span>人</div>
      <div class="bg-B">B チーム <span id="countB">0</span>人</div>
    </div>
  </section>

  <section id="tab-scores">
    <h2>スコア入力</h2>
    <p class="note">表示範囲を選んでスコアを入力してください。自動保存されます。</p>
    <div class="view-toggle" id="viewToggle">
      <button data-view="out" class="active">前半 (1-9)</button>
      <button data-view="in">後半 (10-18)</button>
      <button data-view="all">全体 (1-18)</button>
    </div>
    <div class="score-table-wrap">
      <table class="scores" id="scoreTable"></table>
    </div>
    <button class="btn-danger" id="resetBtn">スコアをリセット</button>
  </section>

  <section id="tab-ranking">
    <h2>ランキング</h2>
    <h3>チーム対抗</h3>
    <div class="team-result" id="teamResult"></div>
    <div class="verdict" id="verdict"></div>
    <h3>個人ランキング</h3>
    <table class="ranking-table" id="individualTable"></table>
  </section>
</main>

<nav class="bottom-nav">
  <button data-tab="teams" class="active"><span class="icon">👥</span><span>チーム</span></button>
  <button data-tab="scores"><span class="icon">📝</span><span>スコア</span></button>
  <button data-tab="ranking"><span class="icon">🏆</span><span>順位</span></button>
</nav>

<script>
const MEMBERS = ['まさき', 'くみこ', 'かずき', 'だいき', 'のぶき', 'りこ', 'しいか'];
const HOLES = 18;
const STORAGE_KEY = 'golfFamilyData_v1';

let scoreView = 'out';
let state = loadState();

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.teams && parsed.scores) return parsed;
    }
  } catch (e) {}
  return {
    teams: Object.fromEntries(MEMBERS.map(m => [m, null])),
    scores: Object.fromEntries(MEMBERS.map(m => [m, Array(HOLES).fill(null)])),
  };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function sumRange(member, from, to) {
  let s = 0;
  for (let i = from; i < to; i++) s += state.scores[member][i] || 0;
  return s;
}
function outOf(member) { return sumRange(member, 0, 9); }
function inOf(member) { return sumRange(member, 9, 18); }
function totalOf(member) { return sumRange(member, 0, 18); }
function holesDone(member) { return state.scores[member].filter(v => v != null).length; }

function setTeam(member, team) {
  state.teams[member] = state.teams[member] === team ? null : team;
  saveState();
  renderTeams();
  renderScoreTable();
  renderRanking();
}

function setScore(member, holeIndex, raw) {
  if (raw === '' || raw == null) {
    state.scores[member][holeIndex] = null;
  } else {
    const n = Number(raw);
    state.scores[member][holeIndex] = Number.isFinite(n) && n > 0 ? n : null;
  }
  saveState();
  updateTotalsRow(member);
  renderRanking();
}

function updateTotalsRow(member) {
  const out = document.getElementById('out-' + member);
  const inn = document.getElementById('in-' + member);
  const tot = document.getElementById('total-' + member);
  if (out) out.textContent = outOf(member) || '-';
  if (inn) inn.textContent = inOf(member) || '-';
  if (tot) tot.textContent = totalOf(member) || '-';
}

function renderTeams() {
  const grid = document.getElementById('teamGrid');
  grid.innerHTML = '';
  let a = 0, b = 0;
  MEMBERS.forEach(m => {
    const t = state.teams[m];
    if (t === 'A') a++;
    if (t === 'B') b++;
    const card = document.createElement('div');
    card.className = 'member-card';
    card.innerHTML = `
      <span class="member-name">${m}</span>
      <div class="team-buttons">
        <button class="team-A ${t === 'A' ? 'selected' : ''}" data-m="${m}" data-t="A">A</button>
        <button class="team-B ${t === 'B' ? 'selected' : ''}" data-m="${m}" data-t="B">B</button>
      </div>`;
    grid.appendChild(card);
  });
  document.getElementById('countA').textContent = a;
  document.getElementById('countB').textContent = b;
  grid.querySelectorAll('button').forEach(btn => {
    btn.onclick = () => setTeam(btn.dataset.m, btn.dataset.t);
  });
}

function renderScoreTable() {
  const table = document.getElementById('scoreTable');
  let from, to, showOut, showIn, showTotal;
  if (scoreView === 'out') { from = 0; to = 9; showOut = true; showIn = false; showTotal = false; }
  else if (scoreView === 'in') { from = 9; to = 18; showOut = false; showIn = true; showTotal = false; }
  else { from = 0; to = 18; showOut = true; showIn = true; showTotal = true; }

  let html = '<thead><tr><th class="name-col">メンバー</th>';
  for (let i = from; i < to; i++) {
    html += `<th>${i + 1}</th>`;
    if (i === 8 && (showOut && scoreView !== 'out')) html += '<th class="subtotal">OUT</th>';
    if (i === 17 && showIn) html += '<th class="subtotal">IN</th>';
  }
  if (scoreView === 'out') html += '<th class="subtotal">OUT</th>';
  if (showTotal) html += '<th class="total">合計</th>';
  html += '</tr></thead><tbody>';

  MEMBERS.forEach(m => {
    const t = state.teams[m];
    const color = t === 'A' ? '#3b82f6' : t === 'B' ? '#ef4444' : '#bbb';
    html += `<tr><td class="name-col"><span class="team-badge" style="background:${color}"></span>${m}</td>`;
    for (let h = from; h < to; h++) {
      const v = state.scores[m][h];
      html += `<td><input type="number" inputmode="numeric" pattern="[0-9]*" min="1" max="20" value="${v ?? ''}" data-m="${m}" data-h="${h}"></td>`;
      if (h === 8 && (showOut && scoreView !== 'out')) html += `<td class="subtotal" id="out-${m}">${outOf(m) || '-'}</td>`;
      if (h === 17 && showIn) html += `<td class="subtotal" id="in-${m}">${inOf(m) || '-'}</td>`;
    }
    if (scoreView === 'out') html += `<td class="subtotal" id="out-${m}">${outOf(m) || '-'}</td>`;
    if (showTotal) html += `<td class="total" id="total-${m}">${totalOf(m) || '-'}</td>`;
    html += '</tr>';
  });
  html += '</tbody>';
  table.innerHTML = html;
  table.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('change', () => setScore(inp.dataset.m, +inp.dataset.h, inp.value));
    inp.addEventListener('blur', () => setScore(inp.dataset.m, +inp.dataset.h, inp.value));
  });
}

function renderRanking() {
  const teamResult = document.getElementById('teamResult');
  const verdict = document.getElementById('verdict');
  let aTotal = 0, bTotal = 0;
  const aMembers = [], bMembers = [];
  MEMBERS.forEach(m => {
    const t = state.teams[m];
    if (t === 'A') { aTotal += totalOf(m); aMembers.push(m); }
    if (t === 'B') { bTotal += totalOf(m); bMembers.push(m); }
  });
  const hasAny = aTotal > 0 || bTotal > 0;
  const bothStarted = aTotal > 0 && bTotal > 0;
  const aWin = bothStarted && aTotal < bTotal;
  const bWin = bothStarted && bTotal < aTotal;
  teamResult.innerHTML = `
    <div class="bg-A ${aWin ? 'winner' : ''}">
      <h4>A チーム (${aMembers.length}人)</h4>
      <div class="members">${aMembers.join(' / ') || '未設定'}</div>
      <div class="score">${aTotal || '-'}</div>
    </div>
    <div class="bg-B ${bWin ? 'winner' : ''}">
      <h4>B チーム (${bMembers.length}人)</h4>
      <div class="members">${bMembers.join(' / ') || '未設定'}</div>
      <div class="score">${bTotal || '-'}</div>
    </div>`;
  if (!hasAny) {
    verdict.textContent = 'スコアを入力すると結果が表示されます';
    verdict.style.color = '#888';
  } else if (!bothStarted) {
    verdict.textContent = '両チームのスコアが入ると勝敗が出ます';
    verdict.style.color = '#888';
  } else if (aTotal === bTotal) {
    verdict.textContent = '🤝 現在タイ';
    verdict.style.color = '#555';
  } else {
    const winner = aWin ? 'A' : 'B';
    const diff = Math.abs(aTotal - bTotal);
    verdict.textContent = `🏆 ${winner} チームが ${diff} 打リード`;
    verdict.style.color = aWin ? '#1e40af' : '#b91c1c';
  }

  const ranked = MEMBERS
    .map(m => ({ name: m, team: state.teams[m], total: totalOf(m), holes: holesDone(m) }))
    .filter(x => x.holes > 0)
    .sort((a, b) => a.total - b.total);
  const tbl = document.getElementById('individualTable');
  if (ranked.length === 0) {
    tbl.innerHTML = '<tr><td style="padding:16px;color:#888">スコアを入力するとランキングが表示されます</td></tr>';
    return;
  }
  let html = '<thead><tr><th class="rank">#</th><th>名前</th><th>チーム</th><th class="num">スコア</th><th class="num">消化</th></tr></thead><tbody>';
  ranked.forEach((r, i) => {
    const teamLabel = r.team ? `${r.team}` : '-';
    const cls = i === 0 ? 'top1' : '';
    html += `<tr class="${cls}"><td class="rank">${i + 1}</td><td>${r.name}</td><td>${teamLabel}</td><td class="num">${r.total}</td><td class="num">${r.holes}/${HOLES}</td></tr>`;
  });
  html += '</tbody>';
  tbl.innerHTML = html;
}

document.querySelectorAll('nav.bottom-nav button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('nav.bottom-nav button').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('section').forEach(s => s.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'instant' in window ? 'instant' : 'auto' });
  };
});

document.querySelectorAll('#viewToggle button').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('#viewToggle button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    scoreView = btn.dataset.view;
    renderScoreTable();
  };
});

document.getElementById('resetBtn').onclick = () => {
  if (confirm('全員のスコアをリセットします。チーム分けは残ります。よろしいですか?')) {
    state.scores = Object.fromEntries(MEMBERS.map(m => [m, Array(HOLES).fill(null)]));
    saveState();
    renderScoreTable();
    renderRanking();
  }
};

renderTeams();
renderScoreTable();
renderRanking();
</script>
</body>
</html>
