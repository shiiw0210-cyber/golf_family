<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>家族ゴルフ大会</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif; margin: 0; background: #f4f6f1; color: #222; }
  header { background: #2d5016; color: #fff; padding: 16px; }
  header h1 { margin: 0 0 12px; font-size: 20px; }
  nav { display: flex; gap: 6px; flex-wrap: wrap; }
  nav button { background: rgba(255,255,255,0.15); color: #fff; border: none; padding: 8px 14px; border-radius: 4px; cursor: pointer; font-size: 14px; transition: background 0.2s ease, color 0.2s ease, transform 0.08s ease; }
  nav button:hover { background: rgba(255,255,255,0.28); }
  nav button:active { transform: scale(0.94); }
  nav button.active { background: #fff; color: #2d5016; font-weight: bold; }
  main { padding: 16px; max-width: 960px; margin: 0 auto; }
  section { display: none; }
  section.active { display: block; animation: tabFade 0.35s ease both; }
  @keyframes tabFade {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Press feedback for all clickable controls */
  button { transition: background 0.2s ease, color 0.2s ease, box-shadow 0.2s ease, transform 0.08s ease; }
  button:active { transform: scale(0.96); }

  /* Floating effect for the home hero */
  .home-hero { text-align: center; margin: 4px 0 18px; }
  .home-hero .ball {
    display: inline-block; font-size: 52px; line-height: 1;
    animation: floatY 3.2s ease-in-out infinite;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,0.15));
  }
  .home-hero .tagline { margin-top: 6px; color: #4a5c2a; font-size: 14px; letter-spacing: 0.05em; }
  @keyframes floatY {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-10px) rotate(4deg); }
  }

  /* Trophy bounce for winner indicators */
  .trophy {
    display: inline-block;
    animation: trophyBounce 1.2s ease-in-out infinite;
    transform-origin: 50% 80%;
  }
  @keyframes trophyBounce {
    0%, 100% { transform: translateY(0) scale(1); }
    30%      { transform: translateY(-6px) scale(1.08); }
    60%      { transform: translateY(0) scale(0.98); }
  }

  /* Confetti canvas overlay */
  #confettiCanvas {
    position: fixed; inset: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 9999; display: none;
  }
  h2 { margin-top: 0; font-size: 18px; }
  h3 { margin: 24px 0 8px; font-size: 15px; color: #444; }
  .note { background: #fff8dc; padding: 10px 12px; border-radius: 6px; font-size: 13px; margin-bottom: 12px; border-left: 4px solid #d4a017; }

  /* Home */
  .home-card { background: #fff; border-radius: 8px; padding: 16px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); margin-bottom: 12px; }
  .home-card h3 { margin-top: 0; }
  .home-meta { color: #555; font-size: 14px; margin: 4px 0; }
  .home-empty { color: #888; font-size: 14px; }

  /* Setup (tournament info) */
  .setup-grid { display: grid; gap: 10px; grid-template-columns: 1fr; margin-bottom: 16px; }
  @media (min-width: 600px) { .setup-grid { grid-template-columns: 1fr 1fr; } }
  .field { background: #fff; padding: 10px 12px; border-radius: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  .field label { display: block; font-size: 12px; color: #666; margin-bottom: 4px; }
  .field input { width: 100%; border: 1px solid #ddd; border-radius: 4px; padding: 8px; font-size: 15px; }

  /* Teams */
  .team-grid { display: grid; gap: 8px; grid-template-columns: 1fr; }
  @media (min-width: 600px) { .team-grid { grid-template-columns: 1fr 1fr; } }
  .member-card { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 12px 14px; border-radius: 6px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  .member-name { font-size: 16px; font-weight: 500; }
  .team-buttons button { padding: 6px 14px; border: 2px solid #ddd; background: #fff; border-radius: 4px; margin-left: 4px; cursor: pointer; font-weight: bold; font-size: 14px; }
  .team-buttons button.team-A.selected { background: #3b82f6; color: #fff; border-color: #3b82f6; }
  .team-buttons button.team-B.selected { background: #ef4444; color: #fff; border-color: #ef4444; }
  .team-summary { display: flex; gap: 10px; margin-top: 16px; }
  .team-summary > div { flex: 1; padding: 10px; border-radius: 6px; text-align: center; color: #fff; font-weight: bold; }
  .bg-A { background: #3b82f6; }
  .bg-B { background: #ef4444; }

  /* Scores */
  .score-toolbar { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .btn { background: #2d5016; color: #fff; border: none; padding: 10px 14px; border-radius: 4px; cursor: pointer; font-size: 14px; }
  .btn-outline { background: #fff; color: #2d5016; border: 1px solid #2d5016; }
  .btn-danger { background: #c62828; color: #fff; border: none; padding: 8px 14px; border-radius: 4px; cursor: pointer; margin-top: 16px; }
  .score-table-wrap { overflow-x: auto; background: #fff; border-radius: 6px; }
  table.scores { border-collapse: collapse; width: 100%; min-width: 720px; }
  table.scores th, table.scores td { border: 1px solid #e4e4e4; padding: 2px; text-align: center; font-size: 13px; }
  table.scores thead th { background: #ecebe2; position: sticky; top: 0; font-weight: 600; }
  table.scores td.name { text-align: left; padding-left: 8px; white-space: nowrap; }
  table.scores input { width: 38px; border: none; background: transparent; text-align: center; font-size: 14px; padding: 6px 0; }
  table.scores input:focus { outline: 2px solid #2d5016; background: #fffde7; }
  table.scores td.total { background: #f6f6ef; font-weight: bold; min-width: 44px; }
  .team-badge { display: inline-block; width: 10px; height: 10px; border-radius: 50%; vertical-align: middle; margin-right: 6px; }

  /* Ranking */
  .team-result { display: flex; gap: 10px; margin-bottom: 8px; }
  .team-result > div { flex: 1; padding: 18px; border-radius: 8px; color: #fff; text-align: center; }
  .team-result h4 { margin: 0 0 6px; font-size: 16px; }
  .team-result .members { font-size: 12px; opacity: 0.9; min-height: 18px; }
  .team-result .score { font-size: 32px; font-weight: bold; margin-top: 6px; }
  .winner { outline: 4px solid #ffd700; outline-offset: -4px; }
  .verdict { text-align: center; font-weight: bold; margin: 12px 0 20px; font-size: 16px; }
  .ranking-table { width: 100%; background: #fff; border-collapse: collapse; border-radius: 6px; overflow: hidden; }
  .ranking-table th, .ranking-table td { padding: 10px; border-bottom: 1px solid #eee; text-align: left; font-size: 14px; }
  .ranking-table th { background: #ecebe2; }
  .ranking-table .rank { width: 40px; text-align: center; font-weight: bold; }
  .ranking-table tr.top1 td { background: #fffbea; font-weight: bold; }

  /* History */
  .history-item { background: #fff; border-radius: 8px; padding: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.08); margin-bottom: 10px; }
  .history-item h4 { margin: 0 0 4px; font-size: 16px; }
  .history-meta { color: #666; font-size: 13px; margin-bottom: 6px; }
  .history-winner { font-weight: bold; color: #b45309; }
  .history-empty { color: #888; font-size: 14px; text-align: center; padding: 24px; }
</style>
</head>
<body>

<header>
  <h1>⛳ 家族ゴルフ大会</h1>
  <nav>
    <button data-tab="home" class="active">ホーム</button>
    <button data-tab="setup">編成</button>
    <button data-tab="scores">スコア</button>
    <button data-tab="ranking">順位</button>
    <button data-tab="history">履歴</button>
  </nav>
</header>

<main>
  <section id="tab-home" class="active">
    <div class="home-hero">
      <span class="ball" aria-hidden="true">⛳</span>
      <div class="tagline">家族でつくる、打ち数の記録</div>
    </div>
    <div class="home-card" id="homeCurrent"></div>
    <h3>前回の優勝</h3>
    <div class="home-card" id="homeLastWinner"></div>
  </section>

  <section id="tab-setup">
    <h2>大会の編成</h2>
    <p class="note">日付・会場を設定し、各メンバーを A / B チームに割り当ててください。同じボタンを再度押すと解除できます。</p>
    <div class="setup-grid">
      <div class="field">
        <label for="inputDate">開催日</label>
        <input type="date" id="inputDate">
      </div>
      <div class="field">
        <label for="inputVenue">会場</label>
        <input type="text" id="inputVenue" placeholder="例: ○○カントリークラブ">
      </div>
    </div>
    <h3>チーム編成(A vs B)</h3>
    <div class="team-grid" id="teamGrid"></div>
    <div class="team-summary">
      <div class="bg-A">A チーム <span id="countA">0</span>人</div>
      <div class="bg-B">B チーム <span id="countB">0</span>人</div>
    </div>
  </section>

  <section id="tab-scores">
    <h2>スコア入力</h2>
    <p class="note">各ホールのスコアを入力してください。合計は自動計算され、入力内容は自動保存されます。</p>
    <div class="score-table-wrap">
      <table class="scores" id="scoreTable"></table>
    </div>
    <button class="btn-danger" id="resetBtn">スコアをリセット</button>
  </section>

  <section id="tab-ranking">
    <h2>順位</h2>
    <h3>チーム対抗</h3>
    <div class="team-result" id="teamResult"></div>
    <div class="verdict" id="verdict"></div>
    <h3>個人ランキング</h3>
    <table class="ranking-table" id="individualTable"></table>
    <div style="margin-top:20px; text-align:center;">
      <button class="btn" id="finalizeBtn">この大会を終了して履歴に保存</button>
    </div>
  </section>

  <section id="tab-history">
    <h2>履歴</h2>
    <div id="historyList"></div>
  </section>
</main>

<canvas id="confettiCanvas"></canvas>

<script>
const MEMBERS = ['まさき', 'くみこ', 'かずき', 'だいき', 'のぶき', 'りこ', 'しいか'];
const HOLES = 18;
const STORAGE_KEY = 'golfFamilyData_v2';
const LEGACY_KEY = 'golfFamilyData_v1';

let state = loadState();

function emptyCurrent(number) {
  const today = new Date().toISOString().slice(0, 10);
  return {
    number: number,
    date: today,
    venue: '',
    teams: Object.fromEntries(MEMBERS.map(m => [m, null])),
    scores: Object.fromEntries(MEMBERS.map(m => [m, Array(HOLES).fill(null)])),
  };
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed.current && parsed.history) return parsed;
    }
  } catch (e) {}
  try {
    const legacy = localStorage.getItem(LEGACY_KEY);
    if (legacy) {
      const parsed = JSON.parse(legacy);
      if (parsed.teams && parsed.scores) {
        const cur = emptyCurrent(1);
        cur.teams = parsed.teams;
        cur.scores = parsed.scores;
        return { current: cur, history: [] };
      }
    }
  } catch (e) {}
  return { current: emptyCurrent(1), history: [] };
}

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

function totalOf(member) {
  return state.current.scores[member].reduce((s, v) => s + (v || 0), 0);
}

function holesDone(member) {
  return state.current.scores[member].filter(v => v != null).length;
}

function setTeam(member, team) {
  state.current.teams[member] = state.current.teams[member] === team ? null : team;
  saveState();
  renderTeams();
  renderScoreTable();
  renderRanking();
  renderHome();
}

function setScore(member, holeIndex, raw) {
  if (raw === '' || raw == null) {
    state.current.scores[member][holeIndex] = null;
  } else {
    const n = Number(raw);
    state.current.scores[member][holeIndex] = Number.isFinite(n) && n > 0 ? n : null;
  }
  saveState();
  updateTotalCell(member);
  renderRanking();
  renderHome();
}

function updateTotalCell(member) {
  const cell = document.getElementById('total-' + member);
  if (cell) cell.textContent = totalOf(member) || '-';
}

function renderHome() {
  const cur = state.current;
  const el = document.getElementById('homeCurrent');
  const aCount = MEMBERS.filter(m => cur.teams[m] === 'A').length;
  const bCount = MEMBERS.filter(m => cur.teams[m] === 'B').length;
  const anyScore = MEMBERS.some(m => holesDone(m) > 0);
  el.innerHTML = `
    <h3>第${cur.number}回 開催中</h3>
    <div class="home-meta">📅 ${cur.date || '(日付未設定)'}</div>
    <div class="home-meta">📍 ${cur.venue || '(会場未設定)'}</div>
    <div class="home-meta">👥 A ${aCount}人 / B ${bCount}人</div>
    <div class="home-meta">⛳ ${anyScore ? 'スコア入力中' : '未開始'}</div>
  `;

  const last = state.history[0];
  const lw = document.getElementById('homeLastWinner');
  if (!last) {
    lw.innerHTML = '<div class="home-empty">履歴はまだありません。大会を終了すると記録されます。</div>';
  } else {
    lw.innerHTML = `
      <h3><span class="trophy">🏆</span> 第${last.number}回 ${last.winnerTeam ? last.winnerTeam + 'チーム 優勝' : '引き分け'}</h3>
      <div class="home-meta">📅 ${last.date} / 📍 ${last.venue || '会場未設定'}</div>
      <div class="home-meta">MVP: ${last.mvp ? last.mvp + ' (' + last.mvpScore + '打)' : '-'}</div>
    `;
  }
}

function renderSetupInputs() {
  const d = document.getElementById('inputDate');
  const v = document.getElementById('inputVenue');
  d.value = state.current.date || '';
  v.value = state.current.venue || '';
  d.onchange = () => { state.current.date = d.value; saveState(); renderHome(); };
  v.oninput = () => { state.current.venue = v.value; saveState(); renderHome(); };
}

function renderTeams() {
  const grid = document.getElementById('teamGrid');
  grid.innerHTML = '';
  let a = 0, b = 0;
  MEMBERS.forEach(m => {
    const t = state.current.teams[m];
    if (t === 'A') a++;
    if (t === 'B') b++;
    const card = document.createElement('div');
    card.className = 'member-card';
    card.innerHTML = `
      <span class="member-name">${m}</span>
      <div class="team-buttons">
        <button class="team-A ${t === 'A' ? 'selected' : ''}" data-m="${m}" data-t="A">A</button>
        <button class="team-B ${t === 'B' ? 'selected' : ''}" data-m="${m}" data-t="B">B</button>
      </div>`;
    grid.appendChild(card);
  });
  document.getElementById('countA').textContent = a;
  document.getElementById('countB').textContent = b;
  grid.querySelectorAll('button').forEach(btn => {
    btn.onclick = () => setTeam(btn.dataset.m, btn.dataset.t);
  });
}

function renderScoreTable() {
  const table = document.getElementById('scoreTable');
  let html = '<thead><tr><th>メンバー</th>';
  for (let i = 1; i <= HOLES; i++) html += `<th>${i}</th>`;
  html += '<th class="total">計</th></tr></thead><tbody>';
  MEMBERS.forEach(m => {
    const t = state.current.teams[m];
    const color = t === 'A' ? '#3b82f6' : t === 'B' ? '#ef4444' : '#bbb';
    html += `<tr><td class="name"><span class="team-badge" style="background:${color}"></span>${m}</td>`;
    for (let h = 0; h < HOLES; h++) {
      const v = state.current.scores[m][h];
      html += `<td><input type="number" inputmode="numeric" min="1" max="20" value="${v ?? ''}" data-m="${m}" data-h="${h}"></td>`;
    }
    html += `<td class="total" id="total-${m}">${totalOf(m) || '-'}</td></tr>`;
  });
  html += '</tbody>';
  table.innerHTML = html;
  table.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('change', () => setScore(inp.dataset.m, +inp.dataset.h, inp.value));
    inp.addEventListener('blur', () => setScore(inp.dataset.m, +inp.dataset.h, inp.value));
  });
}

function computeTotals() {
  let aTotal = 0, bTotal = 0;
  const aMembers = [], bMembers = [];
  MEMBERS.forEach(m => {
    const t = state.current.teams[m];
    if (t === 'A') { aTotal += totalOf(m); aMembers.push(m); }
    if (t === 'B') { bTotal += totalOf(m); bMembers.push(m); }
  });
  return { aTotal, bTotal, aMembers, bMembers };
}

function renderRanking() {
  const teamResult = document.getElementById('teamResult');
  const verdict = document.getElementById('verdict');
  const { aTotal, bTotal, aMembers, bMembers } = computeTotals();
  const hasAny = aTotal > 0 || bTotal > 0;
  const bothStarted = aTotal > 0 && bTotal > 0;
  const aWin = bothStarted && aTotal < bTotal;
  const bWin = bothStarted && bTotal < aTotal;
  teamResult.innerHTML = `
    <div class="bg-A ${aWin ? 'winner' : ''}">
      <h4>A チーム (${aMembers.length}人)</h4>
      <div class="members">${aMembers.join(' / ') || '未設定'}</div>
      <div class="score">${aTotal || '-'}</div>
    </div>
    <div class="bg-B ${bWin ? 'winner' : ''}">
      <h4>B チーム (${bMembers.length}人)</h4>
      <div class="members">${bMembers.join(' / ') || '未設定'}</div>
      <div class="score">${bTotal || '-'}</div>
    </div>`;
  if (!hasAny) {
    verdict.textContent = 'スコアを入力すると結果が表示されます';
    verdict.style.color = '#888';
  } else if (!bothStarted) {
    verdict.textContent = '両チームのスコアが入ると勝敗が出ます';
    verdict.style.color = '#888';
  } else if (aTotal === bTotal) {
    verdict.textContent = '🤝 現在タイ';
    verdict.style.color = '#555';
  } else {
    const winner = aWin ? 'A' : 'B';
    const diff = Math.abs(aTotal - bTotal);
    verdict.innerHTML = `<span class="trophy">🏆</span> ${winner} チームが ${diff} 打リード (合計打数が少ない方が勝ち)`;
    verdict.style.color = aWin ? '#1e40af' : '#b91c1c';
  }

  const ranked = MEMBERS
    .map(m => ({ name: m, team: state.current.teams[m], total: totalOf(m), holes: holesDone(m) }))
    .filter(x => x.holes > 0)
    .sort((a, b) => a.total - b.total);
  const tbl = document.getElementById('individualTable');
  if (ranked.length === 0) {
    tbl.innerHTML = '<tr><td style="padding:16px;color:#888">スコアを入力するとランキングが表示されます</td></tr>';
    return;
  }
  let html = '<thead><tr><th class="rank">#</th><th>名前</th><th>チーム</th><th>スコア</th><th>消化</th></tr></thead><tbody>';
  ranked.forEach((r, i) => {
    const teamLabel = r.team ? `${r.team}チーム` : '-';
    const cls = i === 0 ? 'top1' : '';
    html += `<tr class="${cls}"><td class="rank">${i + 1}</td><td>${r.name}</td><td>${teamLabel}</td><td>${r.total}</td><td>${r.holes}/${HOLES}</td></tr>`;
  });
  html += '</tbody>';
  tbl.innerHTML = html;
}

function renderHistory() {
  const list = document.getElementById('historyList');
  if (!state.history.length) {
    list.innerHTML = '<div class="history-empty">まだ履歴がありません。大会を終了して履歴に保存するとここに並びます。</div>';
    return;
  }
  list.innerHTML = state.history.map(h => `
    <div class="history-item">
      <h4>第${h.number}回 <span class="history-winner">${h.winnerTeam ? h.winnerTeam + 'チーム 優勝 ' : '引き分け 🤝'}${h.winnerTeam ? '<span class="trophy">🏆</span>' : ''}</span></h4>
      <div class="history-meta">📅 ${h.date} / 📍 ${h.venue || '会場未設定'}</div>
      <div class="history-meta">A: ${h.totalA} 打 / B: ${h.totalB} 打</div>
      <div class="history-meta">MVP: ${h.mvp ? h.mvp + ' (' + h.mvpScore + '打)' : '-'}</div>
    </div>
  `).join('');
}

function finalizeTournament() {
  const cur = state.current;
  const anyScore = MEMBERS.some(m => holesDone(m) > 0);
  if (!anyScore) {
    alert('スコアが入っていません。終了できません。');
    return;
  }
  if (!confirm(`第${cur.number}回大会を終了して履歴に保存しますか？\n(終了すると現在のスコアはクリアされ、新しい大会が始まります)`)) return;

  const { aTotal, bTotal } = computeTotals();
  let winnerTeam = null;
  if (aTotal > 0 && bTotal > 0) {
    if (aTotal < bTotal) winnerTeam = 'A';
    else if (bTotal < aTotal) winnerTeam = 'B';
  }
  const ranked = MEMBERS
    .map(m => ({ name: m, total: totalOf(m), holes: holesDone(m) }))
    .filter(x => x.holes > 0)
    .sort((a, b) => a.total - b.total);
  const mvp = ranked[0] || null;

  const record = {
    id: Date.now().toString(),
    number: cur.number,
    date: cur.date,
    venue: cur.venue,
    teams: JSON.parse(JSON.stringify(cur.teams)),
    scores: JSON.parse(JSON.stringify(cur.scores)),
    totalA: aTotal,
    totalB: bTotal,
    winnerTeam: winnerTeam,
    mvp: mvp ? mvp.name : null,
    mvpScore: mvp ? mvp.total : null,
    finishedAt: new Date().toISOString(),
  };
  state.history.unshift(record);
  state.current = emptyCurrent(cur.number + 1);
  saveState();
  renderAll();
  if (winnerTeam) confetti.fire();
  switchTab('history');
  setTimeout(() => {
    alert(`第${record.number}回大会を履歴に保存しました。`);
  }, 50);
}

function switchTab(name) {
  document.querySelectorAll('nav button').forEach(b => b.classList.toggle('active', b.dataset.tab === name));
  document.querySelectorAll('section').forEach(s => {
    const shouldShow = s.id === 'tab-' + name;
    if (shouldShow) {
      s.classList.remove('active');
      void s.offsetWidth; // force reflow so fade animation replays
      s.classList.add('active');
    } else {
      s.classList.remove('active');
    }
  });
}

/* ---------- Confetti ---------- */
const confetti = (() => {
  const canvas = document.getElementById('confettiCanvas');
  const ctx = canvas.getContext('2d');
  const COLORS = ['#ffd700', '#f5c048', '#d4a017', '#3b82f6', '#ef4444', '#2d5016', '#fff'];
  let pieces = [];
  let raf = null;
  let running = false;

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function spawn(count) {
    const W = canvas.width;
    for (let i = 0; i < count; i++) {
      pieces.push({
        x: Math.random() * W,
        y: -20 - Math.random() * 200,
        w: 6 + Math.random() * 6,
        h: 8 + Math.random() * 8,
        vx: -2 + Math.random() * 4,
        vy: 2 + Math.random() * 4,
        rot: Math.random() * Math.PI * 2,
        vr: -0.2 + Math.random() * 0.4,
        color: COLORS[Math.floor(Math.random() * COLORS.length)],
        life: 260 + Math.random() * 160,
      });
    }
  }

  function tick() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    pieces.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.05;
      p.rot += p.vr;
      p.life -= 1;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
    });
    pieces = pieces.filter(p => p.life > 0 && p.y < canvas.height + 40);
    if (pieces.length > 0) {
      raf = requestAnimationFrame(tick);
    } else {
      running = false;
      canvas.style.display = 'none';
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }
  }

  function fire() {
    resize();
    canvas.style.display = 'block';
    spawn(120);
    setTimeout(() => spawn(80), 250);
    setTimeout(() => spawn(60), 550);
    if (!running) {
      running = true;
      raf = requestAnimationFrame(tick);
    }
  }

  window.addEventListener('resize', () => { if (running) resize(); });
  return { fire };
})();
